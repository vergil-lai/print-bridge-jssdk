<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrintBridge JSSDK Example</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #172033;
        background: #f6f8fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #526070;
      }

      .panel {
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
        padding: 20px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
      }

      .printable-preview {
        width: min(420px, 100%);
        margin-bottom: 20px;
        border: 1px solid #cfd7e3;
        border-radius: 8px;
        background: #f8fafc;
        padding: 18px;
      }

      .printable-preview h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .printable-preview dl {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 8px 12px;
        margin: 0;
      }

      .printable-preview dt {
        color: #64748b;
      }

      .printable-preview dd {
        margin: 0;
        font-weight: 700;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 10px 14px;
      }

      button.secondary {
        background: #0f766e;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      pre {
        min-height: 220px;
        margin: 0;
        overflow: auto;
        border-radius: 6px;
        background: #101827;
        color: #d7e1f0;
        padding: 16px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PrintBridge JSSDK Example</h1>
      <p>使用 GitHub raw URL 提交 A4 PDF 和 JPG 打印任务。</p>

      <section class="panel">
        <div class="actions">
          <button id="connect">连接 Agent</button>
          <button id="print-pdf" disabled>打印 PDF</button>
          <button id="print-jpg" class="secondary" disabled>打印 JPG</button>
          <button id="print-batch" disabled>批量打印</button>
          <button id="print-html" disabled>打印 HTML</button>
          <button id="print-html-raw" disabled>打印 HTML Raw</button>
        </div>
        <section id="html-printable" class="printable-preview">
          <h2>PrintBridge HTML Sample</h2>
          <dl>
            <dt>Order</dt>
            <dd>PB-20260705-001</dd>
            <dt>Format</dt>
            <dd>HTML element</dd>
            <dt>Paper</dt>
            <dd>A4 210 x 297 mm</dd>
            <dt>Status</dt>
            <dd>Ready to print</dd>
          </dl>
        </section>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module">
      import { PrintBridgeClient } from '../dist/index.js';

      const pdfUrl =
        'https://raw.githubusercontent.com/vergil-lai/print-bridge-jssdk/main/examples/assets/printbridge-a4-sample.pdf';
      const jpgUrl =
        'https://raw.githubusercontent.com/vergil-lai/print-bridge-jssdk/main/examples/assets/printbridge-a4-sample.jpg';

      const client = new PrintBridgeClient({
        ip: '127.0.0.1',
        port: 17890,
      });

      const logElement = document.querySelector('#log');
      const connectButton = document.querySelector('#connect');
      const printPdfButton = document.querySelector('#print-pdf');
      const printJpgButton = document.querySelector('#print-jpg');
      const printBatchButton = document.querySelector('#print-batch');
      const printHtmlButton = document.querySelector('#print-html');
      const printHtmlRawButton = document.querySelector('#print-html-raw');

      function log(message, value) {
        const line = value ? `${message} ${JSON.stringify(value)}` : message;
        logElement.textContent += `${line}\n`;
        logElement.scrollTop = logElement.scrollHeight;
      }

      function setPrintButtons(enabled) {
        printPdfButton.disabled = !enabled;
        printJpgButton.disabled = !enabled;
        printBatchButton.disabled = !enabled;
        printHtmlButton.disabled = !enabled;
        printHtmlRawButton.disabled = !enabled;
      }

      client.on('connect', () => log('connected'));
      client.on('disconnect', event => {
        log('disconnected', event);
        setPrintButtons(false);
      });
      client.on('status', event => log('status', event));
      client.on('error', error =>
        log('error', {
          code: error.code,
          message: error.message,
          requestId: error.requestId,
        }),
      );

      connectButton.addEventListener('click', async () => {
        try {
          await client.connect();
          const pong = await client.ping();
          log('pong', pong);
          setPrintButtons(true);
        } catch (error) {
          log('connect failed', {
            code: error.code,
            message: error.message,
          });
        }
      });

      printPdfButton.addEventListener('click', async () => {
        const accepted = await client.print({
          requestId: 'EXAMPLE-PDF-001',
          jobId: 'EXAMPLE-PDF-JOB-001',
          type: 'pdf',
          fileUrl: pdfUrl,
          copies: 1,
          paper: {
            widthMm: 210,
            heightMm: 297,
          },
        });

        log('pdf queued', accepted);
      });

      printJpgButton.addEventListener('click', async () => {
        const accepted = await client.print({
          requestId: 'EXAMPLE-JPG-001',
          jobId: 'EXAMPLE-JPG-JOB-001',
          type: 'image',
          fileUrl: jpgUrl,
          copies: 1,
          paper: {
            widthMm: 210,
            heightMm: 297,
          },
        });

        log('jpg queued', accepted);
      });

      printBatchButton.addEventListener('click', async () => {
        const accepted = await client.printBatch({
          requestId: 'EXAMPLE-BATCH-001',
          batchId: 'EXAMPLE-BATCH',
          jobs: [
            {
              jobId: 'EXAMPLE-BATCH-PDF',
              type: 'pdf',
              fileUrl: pdfUrl,
              copies: 1,
              paper: {
                widthMm: 210,
                heightMm: 297,
              },
            },
            {
              jobId: 'EXAMPLE-BATCH-JPG',
              type: 'image',
              fileUrl: jpgUrl,
              copies: 1,
              paper: {
                widthMm: 210,
                heightMm: 297,
              },
            },
          ],
        });

        log('batch queued', accepted);
      });

      printHtmlButton.addEventListener('click', async () => {
        const accepted = await client.print({
          requestId: 'EXAMPLE-HTML-001',
          jobId: 'EXAMPLE-HTML-JOB-001',
          type: 'html',
          printable: 'html-printable',
          copies: 1,
          paper: {
            widthMm: 210,
            heightMm: 297,
          },
          documentTitle: 'PrintBridge HTML Sample',
          html2pdfOptions: {
            margin: 12,
          },
        });

        log('html queued', accepted);
      });

      printHtmlRawButton.addEventListener('click', async () => {
        const accepted = await client.print({
          requestId: 'EXAMPLE-HTML-RAW-001',
          jobId: 'EXAMPLE-HTML-RAW-JOB-001',
          type: 'html-raw',
          html: `
            <section class="raw-page">
              <h1>PrintBridge HTML Raw Sample</h1>
              <p>Raw HTML is rendered to a PDF data URL in the browser before it is sent to the local Agent.</p>
              <table>
                <tbody>
                  <tr><th>Order</th><td>PB-RAW-20260705-001</td></tr>
                  <tr><th>Format</th><td>html-raw</td></tr>
                  <tr><th>Paper</th><td>A4 210 x 297 mm</td></tr>
                </tbody>
              </table>
            </section>
          `,
          style: `
            body {
              font-family: Arial, sans-serif;
              color: #172033;
            }

            .raw-page {
              border: 2px solid #0f766e;
              padding: 28px;
            }

            h1 {
              margin: 0 0 16px;
              color: #0f766e;
            }

            p {
              margin: 0 0 20px;
              color: #475569;
            }

            table {
              width: 100%;
              border-collapse: collapse;
            }

            th,
            td {
              border: 1px solid #cbd5e1;
              padding: 10px 12px;
              text-align: left;
            }
          `,
          copies: 1,
          paper: {
            widthMm: 210,
            heightMm: 297,
          },
          documentTitle: 'PrintBridge HTML Raw Sample',
          html2pdfOptions: {
            margin: 12,
          },
        });

        log('html raw queued', accepted);
      });
    </script>
  </body>
</html>
